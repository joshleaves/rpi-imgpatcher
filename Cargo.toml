[package]
name = "rpi-imgpatcher"
version = "0.9.1"
edition = "2024"

[lib]
crate-type = ["rlib", "staticlib"]

[[bin]]
name = "rpi-imgpatcher"
path = "src/cli.rs"

[dependencies]
fatfs = "0.3.6"
fscommon = "0.1.1"
mbrman = "0.6.1"
tempfile = "3.27.0"

[dev-dependencies]
crc32fast = "1.5.0"
uuid = { version = "1.23.0", features = ["v4"] }

[package.metadata.cbindgen]
language = "C"
pragma_once = true
include_guard = "RPI_IMGPATCHER_H"

[package.metadata.cbindgen.export]
include = [
  "rpi_image_new",
  "rpi_image_write_file",
  "rpi_image_write_bytes",
  "rpi_image_write_string",
  "rpi_image_append_bytes",
  "rpi_image_append_string",
  "rpi_image_save_to_file",
  "rpi_image_overwrite"
]
